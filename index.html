<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GitHub Repo Manager</title>
	<style>
		body {
			background: #181818;
			color: #f5f5f5;
			font-family: 'Segoe UI', Arial, sans-serif;
			margin: 0;
			padding: 0;
		}
		.container {
			max-width: 600px;
			margin: 40px auto;
			background: #222;
			border-radius: 10px;
			box-shadow: 0 2px 8px #000a;
			padding: 32px;
		}
		h1 {
			text-align: center;
			margin-bottom: 24px;
			color: #fff;
		}
		.repo-list {
			list-style: none;
			padding: 0;
			margin-bottom: 24px;
		}
		.repo-item {
			background: #333;
			margin-bottom: 16px;
			padding: 16px;
			border-radius: 8px;
			display: flex;
			justify-content: space-between;
			align-items: flex-start;
			border-left: 4px solid #27ae60;
		}
		.repo-info {
			flex: 1;
		}
		.repo-title {
			margin: 0 0 8px 0;
			color: #fff;
			font-size: 1.2em;
		}
		.repo-description {
			margin: 0 0 12px 0;
			color: #ccc;
			font-size: 0.9em;
			line-height: 1.4;
		}
		.repo-stats {
			display: flex;
			gap: 12px;
			margin-bottom: 8px;
		}
		.stat {
			background: #444;
			padding: 4px 8px;
			border-radius: 4px;
			font-size: 0.8em;
			color: #f5f5f5;
		}
		.repo-actions {
			display: flex;
			flex-direction: column;
			gap: 8px;
			margin-left: 16px;
		}
		.visit-btn {
			background: #3498db;
			color: #fff;
			text-decoration: none;
			border-radius: 4px;
			padding: 6px 12px;
			font-size: 0.9em;
			text-align: center;
			transition: background 0.2s;
		}
		.visit-btn:hover {
			background: #2980b9;
		}
		.remove-btn {
			background: #e74c3c;
			color: #fff;
			border: none;
			border-radius: 4px;
			padding: 6px 12px;
			cursor: pointer;
			font-size: 0.95em;
		}
		.remove-btn:hover {
			background: #c0392b;
		}
		.add-repo-form {
			display: flex;
			gap: 10px;
		}
		.add-repo-form input {
			flex: 1;
			padding: 8px;
			border-radius: 4px;
			border: 1px solid #444;
			background: #222;
			color: #fff;
		}
		.add-repo-form button {
			background: #27ae60;
			color: #fff;
			border: none;
			border-radius: 4px;
			padding: 8px 16px;
			cursor: pointer;
			font-size: 1em;
		}
		.add-repo-form button:hover {
			background: #219150;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>GitHub Repo Manager</h1>
		<ul class="repo-list" id="repoList"></ul>
		<form class="add-repo-form" id="addRepoForm">
			<input type="text" id="repoInput" placeholder="owner/repo" required />
			<button type="submit">Add Repo</button>
		</form>
	</div>
	<script src="main.js"></script>
</body>
</html>
